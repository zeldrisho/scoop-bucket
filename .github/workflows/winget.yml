name: Sync Winget

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'bucket/*.json'
  workflow_dispatch:

jobs:
  detect:
    name: Detect manifest version changes
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.collect.outputs.has_updates }}
      packages: ${{ steps.collect.outputs.packages }}
    steps:
      - name: Checkout bucket
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Collect Winget updates
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"
          head_sha="${{ github.sha }}"
          map_file="winget/package-map.json"

          if [ ! -f "$map_file" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "packages=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            before="$(git rev-list --max-count=1 HEAD^)"
          fi

          changed_files=$(git diff --name-only "$before" "$head_sha" -- 'bucket/*.json' || true)

          if [ -z "$changed_files" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "packages=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          updates_json='[]'

          while IFS= read -r manifest_path; do
            [ -z "$manifest_path" ] && continue
            manifest_name="$(basename "$manifest_path" .json)"

            winget_id=$(jq -r --arg name "$manifest_name" '.[$name] // empty' "$map_file")
            if [ -z "$winget_id" ]; then
              continue
            fi

            new_version=$(jq -r '.version // empty' "$manifest_path")
            [ -z "$new_version" ] && continue

            if git cat-file -e "$before:$manifest_path" 2>/dev/null; then
              old_version=$(git show "$before:$manifest_path" | jq -r '.version // empty' || true)
            else
              old_version=""
            fi

            if [ -z "$old_version" ] || [ "$old_version" = "$new_version" ]; then
              continue
            fi

            first_url=$(jq -r '[.url, (.architecture // {} | to_entries[]?.value.url)]
              | flatten
              | map(select(type == "string" and length > 0))
              | map(split("#")[0])
              | .[0] // empty' "$manifest_path")

            if [ -z "$first_url" ]; then
              echo "Skipping $manifest_path: no installer URL found"
              continue
            fi

            updates_json=$(jq -c --arg id "$winget_id" --arg version "$new_version" --arg url "$first_url" \
              '. + [{identifier: $id, version: $version, url: $url}]' <<< "$updates_json")
          done <<< "$changed_files"

          if [ "$(jq length <<< "$updates_json")" -eq 0 ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "packages=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_updates=true" >> "$GITHUB_OUTPUT"
          {
            echo "packages<<EOF"
            echo "$updates_json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  submit:
    name: Submit Winget updates
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_updates == 'true'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
    steps:
      - name: Checkout bucket
        uses: actions/checkout@main

      - name: Run Komac update
        uses: michidk/run-komac@v2
        with:
          args: >-
            update ${{ matrix.package.identifier }}
            --version ${{ matrix.package.version }}
            --urls ${{ matrix.package.url }}
            --submit
            --token ${{ github.token }}
