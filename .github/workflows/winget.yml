name: Sync Winget

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'bucket/*.json'
  workflow_dispatch:

jobs:
  detect:
    name: Detect manifest version changes
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.collect.outputs.has_updates }}
      packages: ${{ steps.collect.outputs.packages }}
    steps:
      - name: Checkout bucket
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Collect Winget updates
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          apply_checkver_replace() {
            local version="$1"
            local replace_template="$2"

            jq -r -n --arg version "$version" --arg tpl "$replace_template" '
              ($version | split(".")) as $parts
              | $tpl
              | gsub("\\$\\{major\\}"; ($parts[0] // ""))
              | gsub("\\$\\{minor\\}"; ($parts[1] // ""))
              | gsub("\\$\\{patch\\}"; ($parts[2] // ""))
              | gsub("\\$\\{build\\}"; ($parts[3] // ""))
              | gsub("\\$\\{revision\\}"; ($parts[4] // ""))
            '
          }

          build_version_pairs() {
            local old_version="$1"
            local new_version="$2"
            local checkver_replace="$3"
            local old_transformed=""
            local new_transformed=""

            if [ -n "$checkver_replace" ]; then
              old_transformed="$(apply_checkver_replace "$old_version" "$checkver_replace")"
              new_transformed="$(apply_checkver_replace "$new_version" "$checkver_replace")"
            fi

            jq -c -n --arg old "$old_version" --arg new "$new_version" --arg old_transformed "$old_transformed" --arg new_transformed "$new_transformed" '
              ($old | split(".")) as $o
              | ($new | split(".")) as $n
              | [
                  {old: $old, new: $new},
                  {old: (if ($old | startswith("v")) then ($old | ltrimstr("v")) else empty end), new: (if ($new | startswith("v")) then ($new | ltrimstr("v")) else empty end)},
                  {old: (if ($old | startswith("v")) then $old else ("v" + $old) end), new: (if ($new | startswith("v")) then $new else ("v" + $new) end)},
                  {old: ($old | gsub("\\."; "-")), new: ($new | gsub("\\."; "-"))},
                  {old: ($old | gsub("\\."; "_")), new: ($new | gsub("\\."; "_"))},
                  {old: ($old | gsub("\\."; "")), new: ($new | gsub("\\."; ""))},
                  {old: ($o[0] // empty), new: ($n[0] // empty)},
                  {old: (if ($o | length) >= 2 then ($o[0] + "." + $o[1]) else empty end), new: (if ($n | length) >= 2 then ($n[0] + "." + $n[1]) else empty end)},
                  {old: (if ($o | length) >= 3 then ($o[0] + "." + $o[1] + "." + $o[2]) else empty end), new: (if ($n | length) >= 3 then ($n[0] + "." + $n[1] + "." + $n[2]) else empty end)},
                  {old: (if ($o | length) >= 2 then ($o[0] + "_" + $o[1]) else empty end), new: (if ($n | length) >= 2 then ($n[0] + "_" + $n[1]) else empty end)},
                  {old: (if ($o | length) >= 3 then ($o[0] + "_" + $o[1] + "_" + $o[2]) else empty end), new: (if ($n | length) >= 3 then ($n[0] + "_" + $n[1] + "_" + $n[2]) else empty end)},
                  {old: (if ($o | length) >= 2 then ($o[0] + "-" + $o[1]) else empty end), new: (if ($n | length) >= 2 then ($n[0] + "-" + $n[1]) else empty end)},
                  {old: (if ($o | length) >= 3 then ($o[0] + "-" + $o[1] + "-" + $o[2]) else empty end), new: (if ($n | length) >= 3 then ($n[0] + "-" + $n[1] + "-" + $n[2]) else empty end)},
                  {old: $old_transformed, new: $new_transformed}
                ]
              | map(select((.old | length) > 0 and (.new | length) > 0 and .old != .new))
              | unique_by(.old)
            '
          }

          before="${{ github.event.before }}"
          head_sha="${{ github.sha }}"
          map_file="winget/package-map.json"
          event_name="${{ github.event_name }}"

          if [ ! -f "$map_file" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "packages=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$event_name" = "workflow_dispatch" ]; then
            changed_files=$(find bucket -maxdepth 1 -type f -name '*.json' | sort)
          else
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="$(git rev-list --max-count=1 HEAD^)"
            fi

            changed_files=$(git diff --name-only "$before" "$head_sha" -- 'bucket/*.json' || true)
          fi

          if [ -z "$changed_files" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "packages=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          updates_json='[]'

          while IFS= read -r manifest_path; do
            [ -z "$manifest_path" ] && continue
            manifest_name="$(basename "$manifest_path" .json)"

            winget_id=$(jq -r --arg name "$manifest_name" '.[$name] // empty' "$map_file")
            if [ -z "$winget_id" ]; then
              continue
            fi

            new_version=$(jq -r '.version // empty' "$manifest_path")
            if [ -z "$new_version" ]; then
              if [ "$event_name" = "workflow_dispatch" ]; then
                echo "::error::Manifest '$manifest_path' is missing a version field"
                exit 1
              fi
              continue
            fi

            if [ "$event_name" != "workflow_dispatch" ]; then
              if git cat-file -e "$before:$manifest_path" 2>/dev/null; then
                old_version=$(git show "$before:$manifest_path" | jq -r '.version // empty' || true)
              else
                old_version=""
              fi

              if [ -z "$old_version" ]; then
                continue
              fi

              latest=$(printf '%s\n%s\n' "$old_version" "$new_version" | sort -V | tail -n1)
              if [ "$latest" != "$new_version" ] || [ "$old_version" = "$new_version" ]; then
                echo "Skipping $manifest_path: version did not increase ($old_version -> $new_version)"
                continue
              fi
            else
              old_version=""
            fi

            checkver_replace=$(jq -r 'if (.checkver | type) == "object" then (.checkver.replace // empty) else empty end' "$manifest_path")

            winget_first_char="$(printf '%s' "$winget_id" | cut -c1 | tr '[:upper:]' '[:lower:]')"
            winget_manifest_base="manifests/${winget_first_char}/${winget_id//./\/}"

            versions_json=$(curl -fsSL "https://api.github.com/repos/microsoft/winget-pkgs/contents/${winget_manifest_base}") || {
              echo "Skipping $manifest_path: cannot read Winget package path for $winget_id"
              continue
            }

            winget_version=$(jq -r '[.[] | select(.type == "dir" and (.name | test("^[0-9]"))) | .name] | sort_by(split(".") | map(tonumber? // .)) | last // empty' <<< "$versions_json")
            if [ -z "$winget_version" ]; then
              echo "Skipping $manifest_path: no Winget versions found for $winget_id"
              continue
            fi

            latest_remote_or_local=$(printf '%s\n%s\n' "$winget_version" "$new_version" | sort -V | tail -n1)
            if [ "$latest_remote_or_local" != "$new_version" ] || [ "$winget_version" = "$new_version" ]; then
              echo "Skipping $manifest_path: Scoop version is not newer than Winget ($new_version <= $winget_version)"
              continue
            fi

            installer_manifest_path="${winget_manifest_base}/${winget_version}/${winget_id}.installer.yaml"
            installer_manifest=$(curl -fsSL "https://raw.githubusercontent.com/microsoft/winget-pkgs/master/${installer_manifest_path}") || {
              echo "Skipping $manifest_path: cannot read $installer_manifest_path"
              continue
            }

            urls_json=$(printf '%s\n' "$installer_manifest" \
              | sed -nE 's/^[[:space:]]*(-[[:space:]]*)?InstallerUrl:[[:space:]]*(.+)$/\2/p' \
              | sed -E 's/[[:space:]]+$//' \
              | jq -R -s 'split("\n") | map(select(length > 0))')

            if [ "$(jq length <<< "$urls_json")" -eq 0 ]; then
              echo "Skipping $manifest_path: no InstallerUrl entries found in Winget manifest"
              continue
            fi

            # Winget manifest URLs usually embed the previous version.
            # Rewrite URL version tokens using manifest-aware candidates first,
            # then fall back to raw Winget/Scoop versions.
            version_pairs_json=$(build_version_pairs "$winget_version" "$new_version" "$checkver_replace")
            if [ -n "$old_version" ]; then
              version_pairs_json=$(jq -c --argjson pairs "$version_pairs_json" --arg old "$old_version" --arg new "$new_version" '
                ($pairs + [{old: $old, new: $new}])
                | map(select((.old | length) > 0 and (.new | length) > 0 and .old != .new))
                | unique_by(.old)
              ' <<< '{}')
            fi

            urls_json=$(jq -c --argjson pairs "$version_pairs_json" '
              def replace_first_match($pairs):
                reduce $pairs[] as $pair
                  ({value: ., done: false};
                    if .done then .
                    elif (.value | contains($pair.old))
                      then {value: (.value | split($pair.old) | join($pair.new)), done: true}
                      else .
                    end
                  )
                | .value;

              map(replace_first_match($pairs))
            ' <<< "$urls_json")

            updates_json=$(jq -c --arg id "$winget_id" --arg version "$new_version" --argjson urls "$urls_json" \
              '. + [{identifier: $id, version: $version, urls: $urls}]' <<< "$updates_json")
          done <<< "$changed_files"

          if [ "$(jq length <<< "$updates_json")" -eq 0 ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "packages=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_updates=true" >> "$GITHUB_OUTPUT"
          {
            echo "packages<<EOF"
            echo "$updates_json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  submit:
    name: Submit Winget updates
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_updates == 'true'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
    steps:
      - name: Checkout bucket
        uses: actions/checkout@main

      - name: Resolve Komac token
        id: token
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          token="${WINGET_TOKEN:-}"

          if [ -z "$token" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::add-mask::$token"
          echo "has_token=true" >> "$GITHUB_OUTPUT"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Skip Komac update when token is missing
        if: steps.token.outputs.has_token != 'true'
        run: echo "::warning::Skipping Komac submission because WINGET_TOKEN is not set"

      - name: Run Komac update
        if: steps.token.outputs.has_token == 'true'
        uses: michidk/run-komac@v2
        with:
          args: >-
            update ${{ matrix.package.identifier }}
            --version ${{ matrix.package.version }}
            --urls ${{ join(matrix.package.urls, ' ') }}
            --submit
            --token ${{ steps.token.outputs.token }}
