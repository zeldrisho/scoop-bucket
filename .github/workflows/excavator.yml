on:
  workflow_dispatch:
  schedule:
    # run every 4 hours
    - cron: '20 */4 * * *'
name: Excavator
permissions:
  contents: write
  actions: write
jobs:
  excavate:
    name: Excavate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@main
      - name: Excavate
        uses: ScoopInstaller/GithubActions@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_UPDATED: 1
      - name: Trigger Winget for mapped manifest updates
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          START_SHA: ${{ github.sha }}
        run: |
          $branchName = $env:REF_NAME
          $startSha = $env:START_SHA
          $remoteRef = "refs/heads/$branchName"

          $remoteLine = git ls-remote origin $remoteRef | Select-Object -First 1
          if (-not $remoteLine) {
            Write-Host "No remote ref found for $remoteRef."
            exit 0
          }

          $remoteSha = ($remoteLine -split '\s+')[0]
          if ($remoteSha -eq $startSha) {
            Write-Host "No new commit was pushed by Excavator."
            exit 0
          }

          if (-not (Test-Path "winget/package-map.json")) {
            Write-Host "winget/package-map.json not found."
            exit 0
          }

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept        = "application/vnd.github+json"
          }

          $compareUrl = "https://api.github.com/repos/$($env:REPOSITORY)/compare/$startSha...$remoteSha"
          $compare = Invoke-RestMethod -Method Get -Headers $headers -Uri $compareUrl

          $changedManifestNames = @(
            $compare.files |
              Where-Object { $_.filename -match '^bucket/[^/]+\.json$' } |
              ForEach-Object { [System.IO.Path]::GetFileNameWithoutExtension($_.filename) } |
              Sort-Object -Unique
          )

          if ($changedManifestNames.Count -eq 0) {
            Write-Host "No bucket manifest updates detected."
            exit 0
          }

          $packageMap = Get-Content "winget/package-map.json" -Raw | ConvertFrom-Json
          $mappedManifestNames = @($packageMap.PSObject.Properties.Name)

          $manifestsToDispatch = @(
            $changedManifestNames |
              Where-Object { $mappedManifestNames -contains $_ } |
              Sort-Object -Unique
          )

          if ($manifestsToDispatch.Count -eq 0) {
            Write-Host "No changed manifests found in package-map.json."
            exit 0
          }

          $dispatchInput = $manifestsToDispatch -join ','
          Write-Host "Dispatching Winget workflow for manifests: $dispatchInput"

          $dispatchUrl = "https://api.github.com/repos/$($env:REPOSITORY)/actions/workflows/winget.yml/dispatches"
          $payload = @{
            ref = $branchName
            inputs = @{
              manifests = $dispatchInput
            }
          } | ConvertTo-Json -Depth 10

          Invoke-RestMethod -Method Post -Headers $headers -Uri $dispatchUrl -ContentType "application/json" -Body $payload
